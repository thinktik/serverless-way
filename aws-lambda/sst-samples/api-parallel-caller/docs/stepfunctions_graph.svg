edState &gt; .shape,        rect.legend.CancelledState {        fill: #dddddd;        }        .node.anchor &gt; .shape {        fill: #FFDA75;        }        .node.state.hovered:not(.selected):not(.NotYetStarted) &gt; .shape,        .node.selected &gt; .shape {        stroke: #555555;        stroke-width: 2px;        }        .node.state.Container.Failed &gt; .shape {        fill: #EE9592;        }        .node.state.Container.CaughtError &gt; .shape {        fill: #FFD27F;        }        .node.state.Container.Succeeded &gt; .shape {        fill: #91EA9A;        }        .node.state.Container.InProgress &gt; .shape {        fill :#A9E4F7;        }        .node.state.Container.Cancelled &gt; .shape {        fill: #EEEEEE;        }        marker {        fill: #555555;        }        .node.anchor,        .node.state.NotYetStarted {        cursor: default;        }        .node.state {        cursor: default;        }        tspan .label {        font-weight: normal;        font-size: 12px;        text-shadow: none;        }    </style></svg>